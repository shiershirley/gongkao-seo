<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#63b3ed;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#90cdf4;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- 左侧政府建筑图标（简化几何风格） -->
  <g transform="translate(80, 180)" fill="white" opacity="0.9">
    <!-- 屋顶 -->
    <polygon points="100,0 0,60 200,60"/>
    <polygon points="100,-15 10,55 190,55"/>
    <!-- 柱子 -->
    <rect x="20" y="60" width="20" height="180" rx="2"/>
    <rect x="60" y="60" width="20" height="180" rx="2"/>
    <rect x="100" y="60" width="20" height="180" rx="2"/>
    <rect x="140" y="60" width="20" height="180" rx="2"/>
    <rect x="180" y="60" width="20" height="180" rx="2"/>
    <!-- 基座 -->
    <rect x="0" y="240" width="200" height="20" rx="2"/>
    <rect x="-10" y="260" width="220" height="16" rx="2"/>
    <!-- 顶部五角星（简化） -->
    <circle cx="100" cy="-30" r="14" fill="#63b3ed"/>
  </g>

  <!-- 分隔线 -->
  <line x1="380" y1="160" x2="380" y2="520" stroke="#63b3ed" stroke-width="1" stroke-opacity="0.4"/>

  <!-- 右侧文字 -->
  <text x="420" y="210" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="80" font-weight="bold" fill="white">公考资讯站</text>

  <!-- 副标题 -->
  <rect x="422" y="235" width="580" height="3" fill="url(#accent)" rx="1.5"/>
  <text x="422" y="285" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" fill="#90cdf4">国考 · 省考 · 社区工作者</text>

  <!-- 标签 -->
  <text x="422" y="360" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">最新公告 · 备考指南 · 真题解析 · 上岸经验</text>

  <!-- 底部关键词条 -->
  <rect x="422" y="410" width="680" height="1" fill="rgba(255,255,255,0.1)"/>
  <text x="422" y="455" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" fill="rgba(255,255,255,0.45)">职位表 | 报名条件 | 笔试面试 | 薪资待遇 | 体检标准</text>

  <!-- 底部URL -->
  <text x="422" y="590" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.35)">gk.edu-sjtu.cn</text>

  <!-- 右下角装饰 -->
  <g transform="translate(1100, 580)" opacity="0.15">
    <rect x="-40" y="-20" width="80" height="60" rx="4" fill="white"/>
    <text x="-30" y="10" font-family="Arial" font-size="12" fill="#1a365d">SEO</text>
  </g>
</svg>
